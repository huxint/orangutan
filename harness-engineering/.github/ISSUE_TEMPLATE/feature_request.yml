name: Feature request
description: Propose a new feature or improvement.
title: "feat: <one-line summary>"
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem motivates this feature?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Short description of the change you have in mind.
    validations:
      required: true
  - type: input
    id: design_doc
    attributes:
      label: Related design doc (`docs/design-docs/...md`) if any
    validations:
      required: false
  - type: input
    id: product_spec
    attributes:
      label: Related product spec (`docs/product-specs/....md`) if any
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
